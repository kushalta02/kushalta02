name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: kushalta02
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=7F5AF0&color_dots=#161B22,#21262D,#30363D,#6E40C9,#A371F7

      - name: Push snake to gh-pages branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_DIR: dist
